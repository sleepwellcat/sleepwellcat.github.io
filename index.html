<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>HELLDIVERS 2 - STRATAGEM & TERMINAL TRAINING</title>
    <style>
        /* 기존 스타일 유지 */
        body { background-color: #0b0e11; color: white; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; margin: 0; overflow: hidden; }
        #sidebar { width: 340px; background-color: #161b22; border-right: 1px solid #30363d; display: flex; flex-direction: column; }
        #loadout-section { padding: 15px; background: rgba(255, 219, 0, 0.03); border-bottom: 2px solid #ffdb00; max-height: 400px; overflow-y: auto; }
        .section-title { color: #ffdb00; font-size: 11px; font-weight: bold; margin-bottom: 10px; letter-spacing: 2px; text-transform: uppercase; }
        .search-container { padding: 15px; border-bottom: 1px solid #30363d; }
        #search-input { width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #30363d; background: #0b0e11; color: white; outline: none; box-sizing: border-box; }
        #menu-list { flex: 1; overflow-y: auto; padding: 10px 15px; }

        .menu-item { display: flex; align-items: center; margin-bottom: 6px; background: #21262d; border-radius: 6px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; overflow: hidden; }
        .menu-item:hover { background: #30363d; border-color: #ffdb00; }
        .menu-item.active-selection { border-color: #ffdb00; background: #2d333b; }
        .item-content { display: flex; align-items: center; gap: 12px; padding: 10px 15px; flex: 1; }
        .item-content img { width: 32px; height: 32px; pointer-events: none; }
        .bookmark-btn { padding: 10px 18px; font-size: 22px; color: #333; transition: 0.2s; border-left: 1px solid rgba(255, 255, 255, 0.05); }
        .bookmark-btn.active { color: #ffdb00; text-shadow: 0 0 10px #ffdb00; }

        #main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #1c2128 0%, #0b0e11 100%); position: relative; }
        
        /* [수정] 상단 컨트롤 바 레이아웃 */
        #mode-controls { position: absolute; top: 30px; display: flex; gap: 20px; align-items: center; background: rgba(0,0,0,0.3); padding: 10px 20px; border-radius: 50px; }
        .btn-mode { padding: 8px 18px; background: transparent; border: 2px solid #ffdb00; color: #ffdb00; cursor: pointer; font-weight: bold; border-radius: 20px; transition: 0.3s; font-size: 12px; }
        .btn-mode.on { background: #ffdb00; color: #000; box-shadow: 0 0 15px #ffdb00; }

        /* [신규] 터미널 자릿수 슬라이더 */
        .terminal-config { display: flex; align-items: center; gap: 10px; color: #00ffcc; font-size: 12px; font-weight: bold; font-family: monospace; border-left: 1px solid #444; padding-left: 20px; }
        #digit-slider { cursor: pointer; accent-color: #00ffcc; width: 80px; }

        .box { border: 2px solid #ffdb00; width: 550px; padding: 50px; background-color: rgba(22, 27, 34, 0.95); border-radius: 10px; text-align: center; position: relative; transition: 0.3s; }
        .box.terminal-active { border-color: #00ffcc; box-shadow: 0 0 30px rgba(0, 255, 204, 0.2); }
        .terminal-grid { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(0deg, rgba(0,255,204,0.03) 0px, rgba(0,255,204,0.03) 1px, transparent 1px, transparent 3px); pointer-events: none; opacity: 0; transition: 0.3s; }
        .box.terminal-active .terminal-grid { opacity: 1; }

        #main-icon { width: 80px; height: 80px; margin-bottom: 15px; }
        .title { color: #ffdb00; font-size: 24px; margin-bottom: 20px; font-weight: 900; }
        .terminal-title { color: #00ffcc !important; font-family: monospace; letter-spacing: 2px; }

        .arrows { display: flex; justify-content: center; gap: 10px; min-height: 50px; align-items: center; flex-wrap: wrap; }
        .arrow-item { width: 30px; height: 30px; background-color: #444; clip-path: polygon(50% 0%, 100% 50%, 75% 50%, 75% 100%, 25% 100%, 25% 50%, 0% 50%); transition: 0.1s; }
        .up { transform: rotate(0deg); } .down { transform: rotate(180deg); } .left { transform: rotate(270deg); } .right { transform: rotate(90deg); }
        .active-arrow { background-color: #ffdb00 !important; filter: drop-shadow(0 0 10px #ffdb00); }
        .terminal-arrow { background-color: #00ffcc !important; filter: drop-shadow(0 0 10px #00ffcc); }

        #timer-display { margin-top: 25px; font-size: 18px; color: #adff2f; font-family: monospace; }
        #history { width: 240px; background-color: #161b22; border-left: 1px solid #30363d; padding: 20px; font-size: 12px; }
    </style>

 let currentStratagem = null;
        let currentIndex = 0;
        let startTime = null;
        let isTiming = false;
        let isBlitzMode = false;
        let isTerminalMode = false;
        let terminalLength = 8; // 기본 자릿수

        // 슬라이더 값 업데이트 및 터미널 갱신
        function updateDigitValue(val) {
            terminalLength = parseInt(val);
            document.getElementById('digit-value').innerText = val;
            if(isTerminalMode) startTerminal(); // 설정 변경 시 즉시 새 문제 생성
        }

        function generateTerminalTask() {
            const keys = ["w", "a", "s", "d"];
            const arrows = {"w":"up", "a":"left", "s":"down", "d":"right"};
            let task = { name: "TERMINAL MODE", command: [], arrows: [] };
            for(let i=0; i < terminalLength; i++) {
                let k = keys[Math.floor(Math.random() * 4)];
                task.command.push(k);
                task.arrows.push(arrows[k]);
            }
            return task;
        }

        function toggleTerminalMode() {
            isTerminalMode = !isTerminalMode;
            isBlitzMode = false;
            updateModeButtons();
            if(isTerminalMode) startTerminal();
        }

        function toggleBlitzMode() {
            if(stratagems.filter(s => s.bookmarked).length === 0) {
                alert("로드아웃에 스트라타젬을 먼저 추가하세요!"); return;
            }
            isBlitzMode = !isBlitzMode;
            isTerminalMode = false;
            updateModeButtons();
            if(isBlitzMode) startRandomBlitz();
        }

        function updateModeButtons() {
            document.getElementById('blitz-btn').classList.toggle('on', isBlitzMode);
            document.getElementById('terminal-btn').classList.toggle('on', isTerminalMode);
            document.getElementById('display-box').classList.toggle('terminal-active', isTerminalMode);
        }

        function startTerminal() {
            currentStratagem = generateTerminalTask();
            setupDisplay(true);
        }

        function startRandomBlitz() {
            const bookmarked = stratagems.filter(s => s.bookmarked);
            currentStratagem = bookmarked[Math.floor(Math.random() * bookmarked.length)];
            setupDisplay(false);
        }

        function setupDisplay(isTerminal) {
            currentIndex = 0; startTime = null; isTiming = false;
            document.getElementById('timer-display').innerText = isTerminal ? "SYSTEM READY..." : "AWAITING INPUT";
            document.getElementById('current-title').innerText = currentStratagem.name;
            document.getElementById('current-title').classList.toggle('terminal-title', isTerminal);
            
            const icon = document.getElementById('main-icon');
            if(isTerminal) icon.style.display = 'none';
            else { icon.src = currentStratagem.img; icon.style.display = 'inline-block'; }

            document.getElementById('display').innerHTML = currentStratagem.arrows.map((arrow, i) => 
                `<span id="step${i}" class="arrow-item ${arrow}"></span>`
            ).join('');
            renderAll();
        }

        function selectStratagem(id) {
            isTerminalMode = false; isBlitzMode = false;
            updateModeButtons();
            currentStratagem = stratagems.find(s => s.id === id);
            setupDisplay(false);
        }

        document.addEventListener('keydown', (e) => {
            if(document.activeElement.id === 'search-input' || !currentStratagem) return;
            const key = e.key.toLowerCase();
            if(!["w","a","s","d"].includes(key)) return;

            if(!isTiming) { startTime = performance.now(); isTiming = true; }

            if(key === currentStratagem.command[currentIndex]) {
                const step = document.getElementById('step' + currentIndex);
                step.classList.add(isTerminalMode ? 'terminal-arrow' : 'active-arrow');
                currentIndex++;

                if(currentIndex === currentStratagem.command.length) {
                    const time = ((performance.now() - startTime)/1000).toFixed(3);
                    document.getElementById('timer-display').innerText = `UPLINK SUCCESS: ${time}s`;
                    addHistory(currentStratagem.name + ` (${currentStratagem.command.length})`, time);
                    isTiming = false;
                    setTimeout(() => {
                        if(isTerminalMode) startTerminal();
                        else if(isBlitzMode) startRandomBlitz();
                        else setupDisplay(false);
                    }, 600);
                }
            } else {
                document.getElementById('timer-display').innerText = "CONNECTION FAILED";
                isTiming = false;
                setTimeout(() => isTerminalMode ? startTerminal() : setupDisplay(false), 400);
            }
        });

        function renderAll() {
            const search = document.getElementById('search-input').value.toLowerCase();
            document.getElementById('loadout-list').innerHTML = stratagems.filter(s=>s.bookmarked).map(i=>createItemHTML(i)).join('');
            document.getElementById('menu-list').innerHTML = stratagems.filter(i=>i.name.toLowerCase().includes(search)).map(i=>createItemHTML(i)).join('');
        }
        function createItemHTML(item) {
            const star = item.bookmarked ? 'active' : '';
            const active = (currentStratagem && currentStratagem.id === item.id) ? 'active-selection' : '';
            return `<div class="menu-item ${active}"><div class="item-content" onclick="selectStratagem(${item.id})"><img src="${item.img}"><span>${item.name}</span></div><div class="bookmark-btn ${star}" onclick="toggleBookmark(event, ${item.id})">★</div></div>`;
        }
        function toggleBookmark(e, id) { e.stopPropagation(); const i = stratagems.find(s=>s.id===id); if(!i.bookmarked && stratagems.filter(s=>s.bookmarked).length>=8) return; i.bookmarked = !i.bookmarked; renderAll(); }
        function addHistory(n, t) { const h = document.getElementById('history-list'); const d = document.createElement('div'); d.style="padding:5px 0; border-bottom:1px solid #333; display:flex; justify-content:space-between; color:#8b949e;"; d.innerHTML=`<span>${n}</span><span style="color:#ffdb00">${t}s</span>`; h.insertBefore(d, h.firstChild); }
        renderAll();
    </script>
